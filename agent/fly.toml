# Fly.io config for the Fornex agent loop.
#
# This is a worker app — no HTTP service, no public ports. Fly will run
# exactly one Machine that boots `node pm2-runner.js` and stays online.
#
# Notes:
#   - app name must be globally unique across Fly. Update before first deploy.
#   - region: pick one close to Solana RPC and Azure OpenAI for low latency.
#     iad (Virginia, USA) is a good default.
#   - 256MB RAM is plenty (the runtime sits at ~140MB after the brain has
#     been swapped in). Bump to 512MB if you hit OOMs.

app = "fornex-agent"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Single always-on Machine. No HTTP service.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

[deploy]
  # If a deploy crashes immediately, surface that loudly instead of looping.
  strategy = "immediate"

# Fly auto-restarts on non-zero exit. The agent is supposed to run forever;
# if it crashes we want it back up.
[restart]
  policy = "on-failure"
  retries = 5
